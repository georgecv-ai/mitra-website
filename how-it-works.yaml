name: "Mitra Website"
status: "active"

description: |
  Static public website for Mitra AI Tutor. Split from the main portal to allow
  independent updates and delegation. Page inventory (EN and KO unless noted):

  - Landing (/)
  - Why Build Mitra (about.html) — founder narrative
  - For Parents, For Students, For Academies/Hagwons/Schools/Tutors (partners.html)
  - How to Work With Mitra (how-to-work-with-mitra.html) — Mitra's letter to
    families, in her voice. Two registers: 반말 (informal) for the student
    section, 존댓말 (polite) for the parent section. EN and KO at structural
    parity (both 151 lines as of 2026-05-04 — KO was previously the older
    short-letter format and was rewritten to match the EN structured doc).
  - FAQ — 31 questions across parents, students, partners
  - Compliance — AI Basic Act / PIPA / safety architecture (live counters
    deferred; see backlog item compliance-live-counters)
  - Blog — EN only, by design
  - Legal: Privacy, Terms, Refund Policy

  Nav structure: About ▾ dropdown + Resources ▾ dropdown + Enroll CTA + Parent
  Login. Footer: 4 columns (Learn / Resources / Legal / Get started) plus a
  muted Admin link below. Nav and footer render from shared/nav-config.json,
  consumed both by build.py here and by portal/nav.py in the Railway app so
  the two surfaces stay in sync.

  Partners page (partners.html) carries two embedded accordion samples
  (added 2026-05-04, EN + KO):
    - "See three sample student moments" — chat-bubble snippets under
      "What changes for your students": Saturday-9pm-stuck (always-available),
      knows-your-curriculum (your textbooks not generic), JJK-pivot-recovery
      (ADHD-tuned). Each tied back to a bullet from the section.
    - "See a sample partner dashboard" — native HTML/CSS recreation of the
      portal's /org/analytics curriculum dashboard (gradient hero with
      health badge, GitHub-style activity heatmap, ranked top topics,
      amber challenge cards with Try: actions, per-class tiles). Plausible
      Brightline-style fixture numbers; static, not live-pulled.

  Enrollment and authenticated areas (admin, parent portal) remain on the
  main portal at mitratutor.com.

flowchart: |
  graph TD
    USER["Visitor"] --> WWW["www.mitratutor.com<br/>Cloudflare Pages"]
    WWW --> LANG{"Browser language?"}
    LANG -->|en| EN["/en/ pages"]
    LANG -->|ko| KO["/ko/ pages"]
    EN --> ENROLL["Click Enroll"]
    KO --> ENROLL
    ENROLL --> PORTAL["mitratutor.com/enroll<br/>(?lang=ko for Korean)"]
    EN --> LOGIN["Click Parent Login"]
    KO --> LOGIN
    LOGIN --> PORTAL_LOGIN["mitratutor.com/parent/login"]

    BARE["mitratutor.com/"] -->|301 redirect| WWW
    BARE_ABOUT["mitratutor.com/about"] -->|301 redirect| WWW

human_interaction:
  activation:
    - name: "Public Website (Production)"
      url: "https://www.mitratutor.com"
    - name: "Local Preview"
      command: "python -m http.server 8080"
      working_dir: "."
      url: "http://localhost:8080"

deployment:
  platform: "Cloudflare Pages"
  url: "https://www.mitratutor.com"
  github: "georgecv-ai/mitra-website (master for prod, staging for preview)"
  auto_deploy: true
  dns:
    - type: "CNAME"
      name: "www"
      target: "mitra-website.georgeneal.workers.dev"
      note: "CF project: mitra-website. Staging: staging-mitra-website.georgeneal.workers.dev (dash not dot). Enable staging branch in CF dashboard Branch Control."

integrations:
  - project: "Mitra"
    direction: "outbound"
    description: "Links to mitratutor.com for enrollment, parent login, and all authenticated features"
