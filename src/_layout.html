<!DOCTYPE html>
<html lang="{{ html_lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ description }}" />
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="{{ fonts_url }}" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/{{ html_lang }}/static/style.css" />
  <link rel="icon" type="image/png" href="/{{ html_lang }}/static/images/mitra-logo-icon-v2_003.png">
  <link rel="canonical" href="https://www.mitratutor.com/{{ html_lang }}/{{ slug_clean }}" />
  <meta property="og:title" content="{{ title }}" />
  <meta property="og:description" content="{{ og_description }}" />
  <meta property="og:image" content="{{ og_image }}" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.mitratutor.com/{{ html_lang }}/{{ slug_clean }}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ title }}" />
  <meta name="twitter:description" content="{{ twitter_description }}" />
  <meta name="twitter:image" content="{{ og_image }}" />
  <link rel="alternate" hreflang="en" href="https://www.mitratutor.com/en/{{ slug_clean }}" />
  <link rel="alternate" hreflang="ko" href="https://www.mitratutor.com/ko/{{ slug_clean }}" />
  <link rel="alternate" hreflang="x-default" href="https://www.mitratutor.com/en/{{ slug_clean }}" />
  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-LsAoaHD8Mux3yrUonjE7S.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>
<!-- Google Tag Manager -->
<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-5S43DC8L');</script>
<!-- End Google Tag Manager -->
{{ extra_head }}
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5S43DC8L"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/{{ html_lang }}/"><img src="/{{ html_lang }}/static/images/mitra-logo-icon-v2_003.png" alt="Mitra" class="navbar-logo">Mitra AI Tutor</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navLinks">
      <ul class="navbar-nav ms-auto">
{{ nav_items_html }}
        <!-- Language toggle -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <img src="{{ lang_toggle_current_flag }}" width="24" height="16" alt="{{ lang_toggle_current_alt }}" style="border-radius:2px;">
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item {{ en_active_class }}" href="/en/{{ slug }}"><img src="/en/static/images/flag-en.png" width="24" height="16" alt="EN" class="me-2" style="border-radius:2px;"> English</a></li>
            <li><a class="dropdown-item {{ ko_active_class }}" href="/ko/{{ slug }}"><img src="/ko/static/images/flag-kr.png" width="24" height="16" alt="KR" class="me-2" style="border-radius:2px;"> 한국어</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

{{ content_block }}

<footer class="site-footer">
  <div class="container">
    <div class="footer-brand mb-4">
      <img src="/{{ html_lang }}/static/images/mitra-logo-icon-v2_003.png" alt="Mitra" class="footer-logo-img">
      <span class="footer-logo">Mitra AI Tutor</span>
    </div>
    <div class="footer-columns">
{{ footer_links_html }}
    </div>
    <div class="footer-bottom">
      <div class="mb-1">{{ footer_copyright }}</div>
      <div class="small text-muted">
        {{ footer_legal_html }}
      </div>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{{ extra_scripts }}
</body>
</html>
