<nav class="wp-nav">

    <a class="wp-nav-logo" href="/{{ html_lang }}/">
      <img src="/{{ html_lang }}/static/images/mitra-logo-icon-v2_003.png" alt="Mitra">
      <span>Mitra AI Tutor</span>
    </a>
    <ul class="wp-nav-items" data-nav-items>
{{ nav_items_html }}
    </ul>
    <div class="wp-nav-lang">
      <a class="{{ en_active_class }}" href="/en/{{ en_slug }}">EN</a>

{{ content_block }}

<footer class="wp-footer">

    <div class="wp-footer-brand">
      <img src="/{{ html_lang }}/static/images/mitra-logo-icon-v2_003.png" alt="Mitra">
      <span>Mitra AI Tutor</span>
    </div>
    <div class="wp-footer-cols">
{{ footer_columns_html }}
    </div>
    <div class="wp-footer-bottom">
      <div>
        <div>{{ footer_copyright }}</div>
        <div class="wp-footer-legal">{{ footer_legal_html }}{{ footer_admin_html }}</div>
      </div>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Dropdown + mobile nav toggling (site-wide)
  (function() {
    var dds = document.querySelectorAll('.wp-nav [data-dd]');
    dds.forEach(function(dd) {
      var trigger = dd.querySelector('[data-dd-trigger]');
      if (!trigger) return;
      trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        var wasOpen = dd.classList.contains('open');
        dds.forEach(function(other) { other.classList.remove('open'); });
        if (!wasOpen) dd.classList.add('open');
      });
    });
    document.addEventListener('click', function() {
      dds.forEach(function(dd) { dd.classList.remove('open'); });
    });
    var burger = document.querySelector('.wp-nav [data-burger]');
    var items = document.querySelector('.wp-nav [data-nav-items]');
    if (burger && items) {
      burger.addEventListener('click', function(e) {
        e.stopPropagation();
        items.classList.toggle('mobile-open');
      });
    }
  })();
</script>
{{ extra_scripts }}
{{ launcher_html }}
</body>
</html>
