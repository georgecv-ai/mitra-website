<style>
  /* ===== Mitra home-v2 (Korean prototype) ===== */
  .kv2-page {
    --green: #2A9D8F;
    --green-dark: #1f7a6e;
    --mint: #EAF5F0;
    --mint-soft: #F2F9F5;
    --kakao: #FEE500;
    --ink: #1f2937;
    --muted: #6b7280;
    color: var(--ink);
    line-height: 1.7;
    word-break: keep-all;
  }
  .kv2-page section { padding: 4.5rem 1.25rem; }
  .kv2-wrap { max-width: 1040px; margin: 0 auto; }
  .kv2-narrow { max-width: 680px; }
  .kv2-center { text-align: center; }

  .kv2-h2 {
    font-size: 1.85rem;
    font-weight: 700;
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 1.5rem;
  }
  .kv2-mitra-en { color: var(--green); letter-spacing: 0.02em; }
  .kv2-eyebrow { color: var(--green-dark); font-weight: 600; font-size: 0.95rem; margin: 0 0 0.6rem; }

  /* CTA */
  .kv2-cta {
    display: inline-block;
    background: var(--green);
    color: #fff;
    font-weight: 700;
    font-size: 1.05rem;
    padding: 0.85rem 2.1rem;
    border-radius: 999px;
    text-decoration: none;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .kv2-cta:hover { background: var(--green-dark); color: #fff; transform: translateY(-1px); }

  /* Image placeholder blocks */
  .kv2-img-ph {
    border: 2px dashed #9cc5ba;
    background: repeating-linear-gradient(45deg, #f4faf7, #f4faf7 12px, #eaf3ef 12px, #eaf3ef 24px);
    border-radius: 14px;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: var(--green-dark);
    font-weight: 600;
    font-size: 0.95rem;
    padding: 1.5rem;
    text-align: center;
  }
  .kv2-img-ph::after {
    content: "[ 자리표시자 ] " attr(data-ph);
    display: block;
    font-weight: 400;
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  /* 1. Hero */
  .kv2-hero { background: linear-gradient(180deg, #ffffff 0%, var(--mint) 100%); padding-top: 5rem; }
  .kv2-hero-h1 {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1.45;
    color: var(--ink);
    margin: 0 0 1.75rem;
  }
  .kv2-hero-h1 em { font-style: normal; color: var(--green); }
  .kv2-hero-ph { margin-top: 2.75rem; min-height: 320px; }

  /* 2. 미트라가 전합니다 */
  .kv2-delivers { background: #fff; }
  .kv2-delivers-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.25rem;
    margin-bottom: 1.75rem;
  }
  .kv2-card {
    background: var(--mint-soft);
    border: 1px solid #dcebe4;
    border-radius: 14px;
    padding: 1.6rem;
  }
  .kv2-card h3 { font-size: 1.15rem; font-weight: 700; color: var(--green-dark); margin: 0 0 0.5rem; }
  .kv2-card p { margin: 0; color: var(--muted); font-size: 0.95rem; }
  .kv2-card-link { text-decoration: none; display: block; transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .kv2-card-link:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(42,157,143,0.12); }
  .kv2-card-ph { border: 2px dashed #9cc5ba; background: #f4faf7; }
  .kv2-card-msg { background: var(--green); display: flex; align-items: center; }
  .kv2-msg-lead { margin: 0; color: #fff; font-size: 1.2rem; line-height: 1.6; }
  .kv2-msg-lead strong { font-weight: 800; }

  .kv2-dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    align-items: center;
    background: var(--mint);
    border-radius: 16px;
    padding: 2rem;
  }
  .kv2-dashboard-text h3 { font-size: 1.3rem; font-weight: 700; color: var(--ink); margin: 0 0 0.6rem; }
  .kv2-dashboard-text p { margin: 0 0 0.75rem; color: var(--muted); }
  .kv2-stars { color: #F4A65B; font-size: 1.2rem; letter-spacing: 2px; }

  /* 3. 이런 고민 */
  .kv2-worries { background: var(--mint); }
  .kv2-worry-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-top: 2.25rem;
  }
  .kv2-worry {
    border-radius: 14px;
    padding: 2.5rem 1rem;
    text-align: center;
    color: #fff;
    font-weight: 700;
    font-size: 1.15rem;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 130px;
    transition: transform 0.15s ease;
  }
  .kv2-worry:hover { transform: translateY(-3px); }
  .kv2-worry-1 { background: #F4A65B; }
  .kv2-worry-2 { background: #5BB98C; }
  .kv2-worry-3 { background: #9A8FC9; }
  .kv2-worry-4 { background: #E8736B; }

  /* 4. 카톡 */
  .kv2-kakao { background: #fff; }
  .kv2-kakao-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; align-items: center; }
  .kv2-kakao-ph { min-height: 280px; }
  .kv2-kakao-text .kv2-h2 { margin-bottom: 1.75rem; }
  .kv2-kakao-actions { display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; }
  .kv2-qr-ph { min-height: 110px; width: 110px; flex: 0 0 110px; border-radius: 10px; }
  .kv2-qr-ph::after { display: none; }

  /* 5. 서연이 이야기 */
  .kv2-story { background: var(--mint-soft); }
  .kv2-story .kv2-h2 { margin-bottom: 2.25rem; }
  .kv2-chat {
    background: #B2C7D9;
    border-radius: 18px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .kv2-bubble {
    max-width: 80%;
    padding: 0.7rem 1rem;
    border-radius: 14px;
    font-size: 0.97rem;
    line-height: 1.6;
  }
  .kv2-bubble-student {
    align-self: flex-end;
    background: var(--kakao);
    color: #3a2e00;
    border-bottom-right-radius: 4px;
  }
  .kv2-bubble-tutor {
    align-self: flex-start;
    background: #fff;
    color: var(--ink);
    border-bottom-left-radius: 4px;
  }

  /* 6. 미트라는 이렇게 배워갑니다 */
  .kv2-learns { background: #fff; }
  .kv2-learns .kv2-h2 { margin-bottom: 2rem; }
  .kv2-steps { list-style: none; padding: 0; margin: 0; }
  .kv2-steps li {
    display: flex;
    gap: 1.1rem;
    align-items: flex-start;
    padding: 1.1rem 0;
    border-bottom: 1px solid #e8f1ed;
  }
  .kv2-steps li:last-child { border-bottom: 0; }
  .kv2-step-tag {
    flex: 0 0 auto;
    background: var(--mint);
    color: var(--green-dark);
    font-weight: 800;
    font-size: 0.8rem;
    padding: 0.35rem 0.7rem;
    border-radius: 6px;
    min-width: 68px;
    text-align: center;
  }
  .kv2-steps li p { margin: 0.1rem 0 0; }
  .kv2-step-start .kv2-step-tag { background: var(--green); color: #fff; }
  .kv2-step-start p { font-weight: 700; }

  /* 7. 솔루션 */
  .kv2-solution { background: var(--mint); }
  .kv2-solution .kv2-h2 { margin-bottom: 2.25rem; }
  .kv2-solution-points {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.25rem;
    margin-bottom: 1.75rem;
  }
  .kv2-sol-point {
    background: #fff;
    border-radius: 14px;
    padding: 1.6rem;
    border-top: 4px solid var(--green);
  }
  .kv2-sol-point h3 { font-size: 1.1rem; font-weight: 700; color: var(--ink); margin: 0 0 0.5rem; }
  .kv2-sol-point p { margin: 0; color: var(--muted); font-size: 0.92rem; }
  .kv2-table-ph { min-height: 220px; }
  .kv2-privacy {
    text-align: center;
    margin: 1.75rem 0 0;
    font-weight: 600;
    color: var(--green-dark);
  }

  /* 8. FAQ */
  .kv2-faq { background: #fff; }
  .kv2-faq .kv2-h2 { margin-bottom: 2rem; }
  .kv2-qa { padding: 1.3rem 0; border-bottom: 1px solid #ececf3; }
  .kv2-qa:last-child { border-bottom: 0; }
  .kv2-qa h3 { font-size: 1.1rem; font-weight: 700; color: var(--green-dark); margin: 0 0 0.5rem; }
  .kv2-qa p { margin: 0; color: var(--ink); }

  /* 9. Closing */
  .kv2-closing { background: linear-gradient(160deg, var(--green) 0%, var(--green-dark) 100%); }
  .kv2-closing .kv2-h2 { color: #fff; }
  .kv2-closing .kv2-cta { background: #fff; color: var(--green-dark); margin-bottom: 2.5rem; }
  .kv2-closing .kv2-cta:hover { background: var(--kakao); color: #3a2e00; }
  .kv2-closing-ph { min-height: 300px; max-width: 360px; margin: 0 auto; border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.12); color: #fff; }
  .kv2-closing-ph::after { color: rgba(255,255,255,0.7); }

  /* Responsive */
  @media (max-width: 760px) {
    .kv2-page section { padding: 3.25rem 1.1rem; }
    .kv2-hero { padding-top: 3.5rem; }
    .kv2-hero-h1 { font-size: 1.65rem; }
    .kv2-h2 { font-size: 1.45rem; }
    .kv2-delivers-grid { grid-template-columns: 1fr; }
    .kv2-dashboard { grid-template-columns: 1fr; }
    .kv2-worry-cards { grid-template-columns: repeat(2, 1fr); }
    .kv2-kakao-grid { grid-template-columns: 1fr; }
    .kv2-solution-points { grid-template-columns: 1fr; }
    .kv2-bubble { max-width: 90%; }
  }
</style>
