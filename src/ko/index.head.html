<style>
    body { font-family: 'Noto Sans KR', 'DM Sans', sans-serif; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Noto Sans KR', 'DM Sans', sans-serif; }

    /* Stats Banner */
    .stats-banner {
      background: linear-gradient(135deg, #1a365d 0%, #2d5a87 100%);
      color: #fff;
      padding: 28px 0;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      text-align: center;
    }
    .stat-item .stat-number {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.1;
    }
    .stat-item .stat-label {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 4px;
    }

    /* Hero Anxiety */
    .hero-anxiety {
      padding: 60px 0 40px;
      text-align: center;
    }
    .hero-anxiety h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a202c;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .hero-highlight {
      background: linear-gradient(120deg, #ebf8ff 0%, #e6fffa 100%);
      border-left: 4px solid #3182ce;
      padding: 20px 28px;
      border-radius: 0 12px 12px 0;
      font-size: 1.15rem;
      color: #2d3748;
      margin: 24px auto;
      max-width: 640px;
      text-align: left;
    }
    .hero-anxiety .btn-cta-primary {
      font-size: 1.2rem;
      padding: 16px 48px;
      margin-top: 20px;
    }
    .hero-sub-note {
      font-size: 0.9rem;
      color: #718096;
      margin-top: 12px;
    }

    /* Parent Worry Grid */
    .worry-section { padding: 48px 0; }
    .worry-section h2 {
      text-align: center;
      font-weight: 700;
      margin-bottom: 32px;
      font-size: 1.6rem;
    }
    .worry-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .worry-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      transition: box-shadow 0.2s;
    }
    .worry-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .worry-card .worry-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .worry-card h4 {
      font-size: 1rem;
      font-weight: 600;
      color: #e53e3e;
      margin-bottom: 8px;
    }
    .worry-card p {
      font-size: 0.95rem;
      color: #4a5568;
      margin: 0;
    }
    .worry-card .worry-solution {
      color: #3182ce;
      font-weight: 500;
      margin-top: 8px;
    }

    /* Features Section */
    .features-section {
      padding: 48px 0;
      background: #f7fafc;
      margin: 0 -12px;
      padding-left: 12px;
      padding-right: 12px;
    }
    .features-section h2 {
      text-align: center;
      font-weight: 700;
      margin-bottom: 32px;
      font-size: 1.6rem;
    }
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .feature-card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      border: 1px solid #e2e8f0;
    }
    .feature-card .feature-icon { font-size: 2rem; margin-bottom: 12px; }
    .feature-card h4 { font-size: 1.05rem; font-weight: 600; margin-bottom: 8px; }
    .feature-card p { font-size: 0.9rem; color: #4a5568; margin: 0; }

    /* Trust Cards */
    .trust-cards-section { padding: 48px 0; }
    .trust-cards-section h2 {
      text-align: center;
      font-weight: 700;
      margin-bottom: 32px;
      font-size: 1.6rem;
    }
    .trust-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .trust-card {
      background: linear-gradient(135deg, #ebf8ff, #f0fff4);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }
    .trust-card h4 { font-size: 1rem; font-weight: 600; color: #2d5a87; margin-bottom: 8px; }
    .trust-card p { font-size: 0.9rem; color: #4a5568; margin: 0; }

    /* Pricing Korean Style */
    .pricing-ko {
      padding: 48px 0;
      text-align: center;
    }
    .pricing-ko h2 { font-weight: 700; margin-bottom: 12px; font-size: 1.6rem; }
    .pricing-ko .pricing-context {
      color: #718096;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }
    .pricing-box {
      background: #fff;
      border: 2px solid #3182ce;
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      margin: 0 auto;
    }
    .pricing-amount {
      font-size: 2.4rem;
      font-weight: 700;
      color: #1a365d;
    }
    .pricing-amount small {
      font-size: 1rem;
      font-weight: 400;
      color: #718096;
    }
    .pricing-compare {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #718096;
    }
    .pricing-compare .compare-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .pricing-compare .compare-highlight {
      color: #3182ce;
      font-weight: 600;
    }

    /* FAQ */
    .faq-section { padding: 48px 0; }
    .faq-section h2 {
      text-align: center;
      font-weight: 700;
      margin-bottom: 32px;
      font-size: 1.6rem;
    }
    .faq-item {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .faq-question {
      background: #f7fafc;
      padding: 16px 20px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .faq-question::after { content: '+'; font-size: 1.4rem; color: #3182ce; }
    .faq-question.active::after { content: '\2212'; }
    .faq-answer {
      padding: 0 20px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }
    .faq-answer.open {
      padding: 16px 20px;
      max-height: 400px;
    }

    /* Phone frame for chat demos */
    .phone-frame {
      background: #1a1a2e;
      border-radius: 28px;
      padding: 12px;
      max-width: 360px;
      margin: 0 auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .phone-frame-inner {
      background: #fff;
      border-radius: 20px;
      padding: 16px;
      min-height: 280px;
    }
    .phone-frame-notch {
      width: 120px;
      height: 6px;
      background: #333;
      border-radius: 3px;
      margin: 0 auto 12px;
    }

    /* KakaoTalk weekly letter frame */
    .kakao-letter-frame {
      background: #b2c7d9;
      border-radius: 16px;
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
    }
    .kakao-letter-inner {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
    }

    /* QR Code Row */
    .qr-row {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 24px;
    }
    .qr-card {
      text-align: center;
      padding: 16px 20px;
      border-radius: 12px;
      width: 160px;
    }
    .qr-card-kt {
      background: #FEE500;
      border: 2px solid #F5D800;
    }
    .qr-card-tg {
      background: #e8f4fd;
      border: 2px solid #0088cc;
    }
    .qr-card img.qr-img {
      width: 100px;
      height: 100px;
      border-radius: 6px;
      background: #fff;
      padding: 4px;
    }
    .qr-card .qr-logo {
      height: 20px;
      margin-bottom: 6px;
    }
    .qr-card .qr-label {
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 6px;
      color: #1a202c;
    }
    .qr-card-tg .qr-label {
      color: #0088cc;
    }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .stat-item .stat-number { font-size: 1.6rem; }
      .worry-grid { grid-template-columns: 1fr; }
      .feature-grid { grid-template-columns: 1fr; }
      .trust-grid { grid-template-columns: 1fr; }
      .hero-anxiety h1 { font-size: 1.6rem; }
      .qr-row { display: none; }
    }
  </style>
